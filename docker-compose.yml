services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - C:/Docker_Data/uploads:/app/uploads
      - C:/Docker_Data/chroma_data:/app/chroma_db
    environment:
      DATABASE_URL: postgresql+psycopg2://examuser:exampass@postgres:5432/examdb
    depends_on:
      - redis
      - postgres

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: ["redis-server", "--bind", "0.0.0.0"]

  celery:
    build: ./server
    command: celery -A app.celery worker --loglevel=info
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - C:/Docker_Data/uploads:/app/uploads
      - C:/Docker_Data/chroma_data:/app/chroma_db
    environment:
      DATABASE_URL: postgresql+psycopg2://examuser:exampass@postgres:5432/examdb

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: examdb
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exampass
    ports:
      - "5432:5432"
    volumes:
      - C:/Docker_Data/postgres_data:/var/lib/postgresql/data

  client:
    build: ./client
    ports:
      - "5173:5173"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
